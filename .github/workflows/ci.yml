name: Python CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 black pylint pytest pytest-cov

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check code formatting with black
      run: |
        black --check src/ || echo "Code formatting issues found. Run 'black src/' to fix."

    - name: Lint with pylint
      run: |
        pylint src/ --exit-zero --rcfile=.pylintrc || true

    - name: Run Python files to check for runtime errors
      run: |
        # Run each Python file that has a main block to check for runtime errors
        find src/ -name "*.py" -type f | while read file; do
          if grep -q "if __name__ == .__main__.:" "$file"; then
            echo "Running $file..."
            python "$file" || echo "Warning: $file had runtime issues"
          fi
        done

    - name: Run tests (if any exist)
      run: |
        if [ -d "tests" ]; then
          pytest tests/ -v --cov=src/ --cov-report=term-missing
        else
          echo "No tests directory found, skipping tests"
        fi

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Check for common issues
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
        
        # Security check
        bandit -r src/ -f txt || true
        
        # Check for known security vulnerabilities in dependencies
        pip install -r requirements.txt
        safety check --json || true
